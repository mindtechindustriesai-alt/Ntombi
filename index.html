            ctx.translate(W / 2, H / 2 + yOffset);

            ctx.textBaseline = 'middle';

                let testLine = line + word + " ";

                    lines.push(line);
                    line = word + " ";
                } else {
                    line = testLine;
                }
            }
            lines.push(line);

            const lineHeight = size * 1.4;
            lines.forEach((lineText, index) => {
                const yPos = (index - (lines.length - 1) / 2) * lineHeight;

                // Deep shadow for readability
                ctx.shadowColor = `rgba(0, 0, 0, ${shadowIntensity})`;

                ctx.shadowOffsetY = 0;
                ctx.fillStyle = color;

                // Crisp core
                ctx.shadowBlur = 0;

            ctx.restore();
        }

                const size = 0.3 + (i % 5) * (0.4 / scale);

                const brightness = 0.10 + (i / starCount) * 0.4;

                ctx.arc(px, py, size * 5, 0, Math.PI * 2);

                    '♾️ INFINITE LOVE ♾️',
                    56,
                    '#FFD700',
                    -180,
                    W * 0.70,
                    0.95
                );

                drawCenteredText(
                    bibleVerses[verseIndex],
                    28,
                    '#D4AF37',
                    -10,
                    W * 0.70,
                    0.90
                );

                drawCenteredText(
                    `"${motivationalQuotes[quoteIndex]}"`,
                    28,
                    '#E8C872',
                    140,
                    W * 0.65,
                    0.90
                );

                drawCenteredText(
                    '✦ From Your Brother and Mkhulu ✦',
                    24,
                    '#C9A84C',
                    250,
                    W * 0.55,
                    0.85
                );
            }

            // ============================================================
            // STATUS — SUBTLE
            // ============================================================
            ctx.fillStyle = 'rgba(255, 215, 0, 0.03)';
            ctx.font = '9px Georgia, serif';
            ctx.fillText(`✦ ${currentScale.toFixed(2)}x`, 20, H - 20);

            requestAnimationFrame(drawInfinite);
        }

        /* ============================================================
           CLICK TO RESTART
        ============================================================ */

        canvas.addEventListener('click', () => {
            currentScale = MIN_SCALE;
            lastVerseIndex = -1;
            lastQuoteIndex = -1;
            console.log('🔄 Journey restarted.');
        });

        /* ============================================================
           START
        ============================================================ */

        console.log('✦ INFINITE ELEGANCE FOR NTOMBI "BELLZ" MDLULI');
        console.log('📖 30 Bible Verses | 💫 30 Quotes');
        console.log('💛 From Your Brother and Mkhulu');

        drawInfinite();
    </script>
</body>
